services:
  server:
    image: codeberg.org/forgejo/forgejo:13-rootless
    container_name: fogejo
    restart: unless-stopped
    user: "1000"
    volumes:
      - ./data:/var/lib/gitea
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:2222:2222"