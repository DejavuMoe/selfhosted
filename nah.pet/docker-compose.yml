services:
  nahpet:
    image: ghcr.io/anhostfr/nah.pet:latest
    container_name: nahpet
    restart: unless-stopped
    environment:
      NODE_ENV: "production"
      HOST: "0.0.0.0"
      PORT: ${PORT:-3000}
      DATABASE_URL: "postgresql://${DB_USER}:${DB_PASSWORD}@nahpet-postgres:5432/${DB_NAME}?schema=public"
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      OAUTH_CLIENT_ID: "${OAUTH_CLIENT_ID}"
      OAUTH_CLIENT_SECRET: "${OAUTH_CLIENT_SECRET}"
      PUBLIC_MAIN_DOMAIN: "${PUBLIC_MAIN_DOMAIN}"
    depends_on:
      nahpet-db:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node build/index.js"
    ports:
      - "127.0.0.1:23000:3000"

  nahpet-db:
    image: postgres:16-alpine
    container_name: nahpet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER}", "-d", "${DB_NAME}"]
      interval: 10s
      timeout: 3s
      retries: 3