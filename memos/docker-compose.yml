services:
  memos:
    image: neosmemo/memos:stable
    container_name: memos
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      - MEMOS_DRIVER=postgres
      - MEMOS_DSN=postgresql://memos:memosdbPassWord@postgres:5432/memos?sslmode=disable
      - MEMOS_MODE=prod
      - MEMOS_ADDR=0.0.0.0
      - MEMOS_PORT=5230
    ports:
      - "127.0.0.1:5230:5230"
    volumes:
      - ./memos/:/var/opt/memos