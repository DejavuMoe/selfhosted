server {
    listen 80;
    listen [::]:80;
    server_name git.your.domain;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name git.your.domain;

    ssl_certificate /path/to/cert/git.your.domain.pem;
    ssl_certificate_key /path/to/cert/git.your.domain.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ecdh_curve X25519:P-256:P-384;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-CHACHA20-POLY1305:ECDHE+AES128:RSA+AES128:ECDHE+AES256:RSA+AES256';
    ssl_prefer_server_ciphers off;

    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    access_log /var/log/nginx/git.your.domain.access.log;
    error_log /var/log/nginx/git.your.domain.error.log;

    client_max_body_size 0;

    location /wicket/websocket {
        proxy_pass http://127.0.0.1:6610/wicket/websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $realip_remote_addr;
    }

    location /~server {
        proxy_pass http://127.0.0.1:6610/~server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $realip_remote_addr;
    }

    location /~api/streaming {
        proxy_pass http://127.0.0.1:6610/~api/streaming;
        proxy_buffering off;
        proxy_set_header X-Forwarded-For $realip_remote_addr;
    }

    location / {
        proxy_pass http://127.0.0.1:6610;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $realip_remote_addr;
    }
}
